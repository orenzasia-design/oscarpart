version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: oscarpart_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       oscarpart
      POSTGRES_USER:     oscarpart_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/indexes.sql:/docker-entrypoint-initdb.d/02_indexes.sql:ro
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U oscarpart_user -d oscarpart"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks: [internal]

  redis:
    image: redis:7-alpine
    container_name: oscarpart_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks: [internal]

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     production
    container_name: oscarpart_backend
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      NODE_ENV:           production
      PORT:               4000
      DB_HOST:            postgres
      DB_PORT:            5432
      DB_NAME:            oscarpart
      DB_USER:            oscarpart_user
      DB_PASSWORD:        ${DB_PASSWORD}
      REDIS_HOST:         redis
      REDIS_PORT:         6379
      REDIS_PASSWORD:     ${REDIS_PASSWORD}
      JWT_ACCESS_SECRET:  ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_URL:       ${FRONTEND_URL:-https://oscarpart.id}
      CORS_ORIGIN:        ${CORS_ORIGIN:-https://oscarpart.id}
      BCRYPT_ROUNDS:      12
      LOG_LEVEL:          info
      WHATSAPP_NUMBER:    ${WHATSAPP_NUMBER}
      EMAIL_PROVIDER:     ${EMAIL_PROVIDER:-smtp}
      SMTP_HOST:          ${SMTP_HOST:-}
      SMTP_PORT:          ${SMTP_PORT:-587}
      SMTP_USER:          ${SMTP_USER:-}
      SMTP_PASSWORD:      ${SMTP_PASSWORD:-}
      EMAIL_FROM_NAME:    OSCARPART
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-noreply@oscarpart.id}
      EMAIL_ADMIN:        ${EMAIL_ADMIN:-admin@oscarpart.id}
      SENDGRID_API_KEY:   ${SENDGRID_API_KEY:-}
    volumes:
      - backend_logs:/app/logs
    networks: [internal]

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: oscarpart_frontend
    restart: unless-stopped
    depends_on: [backend]
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://oscarpart.id/api/v1}
      NODE_ENV: production
    networks: [internal]

  nginx:
    image: nginx:alpine
    container_name: oscarpart_nginx
    restart: unless-stopped
    depends_on: [backend, frontend]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks: [internal]

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  certbot_certs:

networks:
  internal:
    driver: bridge
