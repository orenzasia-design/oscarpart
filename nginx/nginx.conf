# ============================================================
# OSCARPART — Nginx Production Config
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=search:10m  rate=30r/m;
limit_req_zone $binary_remote_addr zone=login:10m   rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m     rate=200r/m;
limit_req_zone $binary_remote_addr zone=global:10m  rate=300r/m;

# Connection limit
limit_conn_zone $binary_remote_addr zone=conn:10m;

# Upstream services
upstream backend  { server backend:4000;  keepalive 32; }
upstream frontend { server frontend:3000; keepalive 16; }

# Redirect HTTP → HTTPS
server {
  listen 80;
  server_name oscarpart.id www.oscarpart.id;
  return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
  listen 443 ssl http2;
  server_name oscarpart.id www.oscarpart.id;

  # SSL — Let's Encrypt (replace with actual cert paths)
  ssl_certificate     /etc/letsencrypt/live/oscarpart.id/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/oscarpart.id/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  # Security headers
  add_header X-Frame-Options             "DENY"                         always;
  add_header X-Content-Type-Options      "nosniff"                      always;
  add_header X-XSS-Protection            "1; mode=block"                always;
  add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains; preload" always;
  add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy
    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.oscarpart.id; font-src 'self' data:; frame-ancestors 'none';"
    always;

  # Connection limit
  limit_conn conn 20;

  # Global rate limit
  limit_req zone=global burst=50 nodelay;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length 1000;

  # Max upload size (for XLSX files)
  client_max_body_size 11m;

  # ── API routes ─────────────────────────────────────────────

  # Search endpoint — strict rate limit
  location ~ ^/api/v1/parts/search {
    limit_req zone=search burst=10 nodelay;
    proxy_pass         http://backend;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 10s;
  }

  # Login — strict rate limit
  location = /api/v1/auth/login {
    limit_req zone=login burst=3 nodelay;
    proxy_pass       http://backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # All other API
  location /api/ {
    limit_req zone=api burst=30 nodelay;
    proxy_pass            http://backend;
    proxy_set_header      Host $host;
    proxy_set_header      X-Real-IP $remote_addr;
    proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header      X-Forwarded-Proto $scheme;
    proxy_read_timeout    30s;
    proxy_connect_timeout 5s;

    # CORS headers (also handled by Express, belt-and-suspenders)
    add_header Access-Control-Allow-Origin  "https://oscarpart.id" always;
    add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type,Authorization,X-Session-Id" always;

    if ($request_method = OPTIONS) {
      return 204;
    }
  }

  # Health check — no rate limit
  location = /health {
    proxy_pass       http://backend/health;
    proxy_set_header Host $host;
    access_log off;
  }

  # ── Frontend (Next.js) ─────────────────────────────────────
  location / {
    proxy_pass            http://frontend;
    proxy_set_header      Host $host;
    proxy_set_header      X-Real-IP $remote_addr;
    proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header      X-Forwarded-Proto $scheme;
    proxy_read_timeout    30s;
    proxy_connect_timeout 5s;

    # Cache Next.js static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg)$ {
      proxy_pass http://frontend;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }
  }

  # Block common attack vectors
  location ~ /\.(git|env|htaccess) { deny all; return 404; }
  location ~ \.(php|asp|aspx|jsp)$  { deny all; return 404; }
}
